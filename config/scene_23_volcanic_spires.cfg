# Scene 23 - Volcanic Spires
# Five infinite cones rising from a dark volcanic ground like magma vents.
# Demonstrates the infinite cone primitive: no height cap, radius is the slope (tan of half-angle).
# Camera sits near ground level to emphasize the infinite upward extent of the spires.
camera:
{
    resolution = { width = 1920; height = 1080; };
    position = { x = 0.0; y = -50.0; z = 5.0; };
    rotation = { x = 93.0; y = 0.0; z = 0.0; };
    fieldOfView = 85.0;
};

# Primitives in the scene
primitives:
{
    # Infinite cones — apex at ground, axis points upward, no height (height = 0 → infinite)
    # radius here is tan(half_angle): the cone grows this many units wide per unit of height
    cones = (
        {
            # Center fiery spire (~14° half-angle)
            apex   = { x = 0.0;   y = 50.0; z = 0.0; };
            axis   = { x = 0.0;   y = 0.0;  z = 1.0; };
            radius = 0.25;
            color  = { r = 255.0; g = 80.0;  b = 10.0; };
        },
        {
            # Left spire (~17° half-angle)
            apex   = { x = -30.0; y = 55.0; z = 0.0; };
            axis   = { x = 0.0;   y = 0.0;  z = 1.0; };
            radius = 0.30;
            color  = { r = 220.0; g = 50.0;  b = 0.0; };
        },
        {
            # Right spire (~17° half-angle)
            apex   = { x = 30.0;  y = 55.0; z = 0.0; };
            axis   = { x = 0.0;   y = 0.0;  z = 1.0; };
            radius = 0.30;
            color  = { r = 220.0; g = 50.0;  b = 0.0; };
        },
        {
            # Far-left narrow spire (~11° half-angle)
            apex   = { x = -15.0; y = 70.0; z = 0.0; };
            axis   = { x = 0.0;   y = 0.0;  z = 1.0; };
            radius = 0.20;
            color  = { r = 180.0; g = 30.0;  b = 0.0; };
        },
        {
            # Far-right narrow spire (~11° half-angle)
            apex   = { x = 15.0;  y = 70.0; z = 0.0; };
            axis   = { x = 0.0;   y = 0.0;  z = 1.0; };
            radius = 0.20;
            color  = { r = 180.0; g = 30.0;  b = 0.0; };
        }
    );

    # List of planes
    planes = (
        {
            # Dark volcanic ground
            point  = { x = 0.0; y = 0.0; z = 0.0; };
            normal = { x = 0.0; y = 0.0; z = 1.0; };
            color  = { r = 30.0; g = 20.0; b = 15.0; };
        }
    );
};

# Light configuration
lights:
{
    ambient = {
        multiplier = 0.05;
        color = { r = 80.0; g = 20.0; b = 0.0; };
    };

    point = (
        {
            # Lava glow from below, between the spires
            position  = { x = 0.0;  y = 55.0;  z = -8.0; };
            color     = { r = 255.0; g = 100.0; b = 20.0; };
            intensity = 8.0;
        },
        {
            # Overhead fill light from in front
            position  = { x = 0.0;  y = -20.0; z = 60.0; };
            color     = { r = 255.0; g = 150.0; b = 80.0; };
            intensity = 1.5;
        }
    );

    directional = (
        {
            position  = { x = 0.0; y = 1.0; z = -0.3; };
            color     = { r = 255.0; g = 60.0; b = 0.0; };
            intensity = 0.3;
        }
    );
};
