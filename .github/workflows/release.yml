name: Release

on:
    workflow_run:
        workflows: ["Mirroring"]
        types: [completed]

permissions:
    contents: write
    issues: write
    pull-requests: write
    id-token: write

jobs:
  release:
    name: Release
    if: github.repository == 'Say-Goodbi/Raytracer'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Run semantic-release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
