name: Mirroring

on:
  workflow_run:
    workflows: ["Publisher"]
    types: [completed]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  push_to_mirror:
    name: Push to mirror
    if: github.repository == 'Say-Goodbi/Raytracer'
    runs-on: ubuntu-latest
    steps:
      - name: check
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: mirror
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: git@github.com:EpitechPGE2-2025/G-OOP-400-RUN-4-1-raytracer-6.git
          ssh_private_key: ${{secrets.GIT_SSH_PRIVATE_KEY}}
