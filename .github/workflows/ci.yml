name: Publisher

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  build:
    name: Build
    if: github.repository == 'Say-Goodbi/Raytracer'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm run build
  test:
      name: Test
      runs-on: ubuntu-latest
      needs: build
      steps:
          - name: check
            uses: actions/checkout@v4
            with:
              fetch-depth: 0
          - name: test
            run: npm run test
  push_to_mirror:
      name: Push to mirror
      runs-on: ubuntu-latest
      needs: test
      steps:
          - name: check
            uses: actions/checkout@v4
            with:
              fetch-depth: 0
          - name: mirror
            uses: pixta-dev/repository-mirroring-action@v1
            with:
              target_repo_url: git@github.com:EpitechPGE2-2025/G-OOP-400-RUN-4-1-raytracer-6.git
              ssh_private_key: ${{secrets.GIT_SSH_PRIVATE_KEY}}
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: push_to_mirror
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Run semantic-release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy_documentation:
    name: Deploy Documentation
    if: github.repository == 'Say-Goodbi/Raytracer'
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Doxygen
        run: sudo apt-get update && sudo apt-get install -y doxygen graphviz

      - name: Generate docs
        run: doxygen Doxyfile

      - name: Push to docs branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: docs
          publish_dir: ./docs/html
          destination_dir: .

